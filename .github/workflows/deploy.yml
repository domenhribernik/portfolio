name: Deploy to Hetzner (SFTP)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history: sitemap lastmod dates come from `git log` per path.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Sitemap, homepage projects fallback, and prerendered blog pages are
      # committed, but regenerating here guarantees prod is never stale.
      - name: Regenerate SEO artifacts
        run: node tools/seo/generate.js

      - name: Run tests
        run: node --test tests/

      - name: Upload via SFTP
        uses: wangyucode/sftp-upload-action@v3.0.0
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: 22
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          localDir: '.'
          remoteDir: ${{ secrets.SFTP_REMOTE_DIR }}
          # Server-only state (env, vendor, cache, data, uploads) must never
          # be uploaded or deleted by CI; there is no composer.json to rebuild
          # vendor from and no shell on the server to fix mistakes.
          exclude: >-
            .git/**,
            .github/**,
            .gitignore,
            .env,
            app/.env,
            vendor/**,
            app/vendor/**,
            app/cache/**,
            app/data/**,
            app/config/dev-mode.php,
            assets/uploads/**,
            tests/**,
            tools/**,
            .agents/**,
            .claude/**,
            bugs.md,
            ideas.md,
            plan.md,
            LICENSE,
            package.json,
            README.md,
            CLAUDE.md,
            views/stocks/**,
            views/slovenia/**,
            views/quizz/**,
            views/download/**,
            app/proxys/download.php
          removeExtraFilesOnServer: false
          concurrency: 1
          dryRun: false
