<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>3D Rock Simulator</title>
    <link rel="stylesheet" href="style.css">
    <base target="_blank">
</head>
<body>
    <div class="container">
        <h1>🪨 3D Rock Simulator</h1>

        <div class="content">
            <div class="control-panel">
                <div class="controls-row">
                    <div class="control-group">
                        <label for="shapeSelect">Shape</label>
                        <select id="shapeSelect">
                            <option value="random">Random</option>
                            <option value="heart">Heart</option>
                            <option value="star">Star</option>
                            <option value="moon">Moon</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="thicknessInput">Thickness</label>
                        <input type="range" id="thicknessInput" min="0.2" max="2" value="0.5" step="0.1">
                    </div>

                    <div class="control-group">
                        <label for="sizeInput">Size</label>
                        <input type="range" id="sizeInput" min="0.5" max="3" value="1.5" step="0.1">
                    </div>

                    <div class="control-group text-group">
                        <label for="rockText">Label <span id="charCounter">0/6</span></label>
                        <input type="text" id="rockText" placeholder="Optional text..." maxlength="6">
                    </div>
                </div>

                <div class="buttons-row">
                    <button class="create-btn" id="createBtn">Create Rock</button>
                    <button class="delete-btn" id="deleteBtn">Delete Rock</button>
                    <button class="clear-btn" id="clearBtn">Clear All</button>
                </div>

                <div class="tips">
                    <strong>Tips:</strong><br>
                    • Tap "Create Rock" then tap the canvas<br>
                    • Drag rocks to move them<br>
                    • Tap "Delete Rock" then tap a rock to remove it<br>
                    • Right-click drag (or one-finger swipe) to rotate view
                </div>
            </div>

            <div class="canvas-wrapper">
                <div id="canvas"></div>
                <div class="canvas-hint" id="canvasHint">Tap "Create Rock" and then tap the canvas to place your stone</div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Rocks:</span>
                        <span class="stat-value" id="rockCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">FPS:</span>
                        <span class="stat-value" id="fpsCounter">60</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
