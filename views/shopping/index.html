<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shopping</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#211f1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shop">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="../../base-style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
                },
                colors: {
                    ink:    '#211f1c',
                    paper:  '#f8f7f4',
                    muted:  '#9b978f',
                    line:   '#e9e6e0',
                    accent: '#d97706',
                },
            },
        },
    };
    </script>
</head>
<body class="font-sans bg-paper text-ink h-dvh overflow-hidden m-0 p-0 flex flex-col">

    <header class="bg-paper border-b border-line shadow-sm shrink-0">
        <div class="max-w-[720px] mx-auto px-4 py-3 flex items-center gap-3">
            <a id="back-link" href="../../" class="text-ink hover:text-accent transition-colors inline-flex items-center gap-2 font-medium text-sm">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="flex-1 text-center text-xl sm:text-2xl font-semibold tracking-tight">Shopping</h1>
            <button id="manage-access" aria-label="Manage list access" title="Who can see this list"
                class="invisible w-10 h-10 flex items-center justify-center rounded-full text-muted hover:text-ink hover:bg-line/60 transition-colors">
                <i class="fas fa-user-lock"></i>
            </button>
        </div>
    </header>

    <nav id="tabs" class="bg-paper border-b border-line shrink-0">
        <div class="max-w-[720px] mx-auto pl-2">
            <div id="tabs-row" class="flex gap-2 px-4 py-2 overflow-x-auto snap-x snap-mandatory no-scrollbar">
                <!-- tabs injected here -->
            </div>
        </div>
    </nav>

    <section id="add-bar" class="bg-paper border-b border-line shrink-0">
        <div class="max-w-[720px] mx-auto px-4 py-3 flex items-center gap-2">
            <input
                id="add-input"
                type="text"
                inputmode="text"
                autocomplete="off"
                enterkeyhint="done"
                placeholder="Add item…"
                class="flex-1 px-4 py-3 rounded-2xl border border-line bg-white text-ink text-base outline-none focus:border-accent focus:ring-2 focus:ring-amber-100 transition-colors min-w-0"
            />
            <button
                id="add-button"
                aria-label="Add item"
                class="w-12 h-12 flex items-center justify-center rounded-full bg-accent text-white text-xl hover:opacity-90 active:scale-95 transition-all shrink-0"
            >
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </section>

    <main id="main" class="flex-1 overflow-y-auto w-full max-w-[720px] mx-auto px-4 py-2 pb-24">
        <ul id="items-active" class="divide-y divide-line"></ul>

        <div id="bought-divider" class="hidden flex items-center justify-between gap-3 mt-6 mb-1 px-1">
            <div class="flex items-center gap-2 text-sm text-muted">
                <span class="h-px bg-line flex-1 w-10"></span>
                <span id="bought-count">bought</span>
            </div>
            <button id="clear-bought" class="text-sm text-muted hover:text-ink underline underline-offset-2">Clear bought</button>
        </div>

        <ul id="items-checked" class="divide-y divide-line"></ul>

        <div id="empty-items" class="hidden text-center text-muted text-sm py-12">
            Nothing here yet. Add something above.
        </div>

        <div id="gate" class="hidden flex flex-col items-center justify-center py-16 gap-4 text-center">
            <i id="gate-icon" class="fas fa-user-lock text-4xl text-muted"></i>
            <p id="gate-message" class="text-muted max-w-xs"></p>
            <a id="gate-link" href="#" class="hidden px-5 py-3 rounded-full bg-accent text-white font-medium hover:opacity-90 transition-opacity">Sign in</a>
        </div>

        <div id="empty-collections" class="hidden flex flex-col items-center justify-center py-16 gap-4">
            <i class="fas fa-cart-shopping text-4xl text-muted"></i>
            <p class="text-muted text-center">No lists yet. Create your first one.</p>
            <div class="flex gap-2 w-full max-w-xs">
                <input
                    id="first-list-input"
                    type="text"
                    placeholder="e.g. Groceries"
                    enterkeyhint="done"
                    class="flex-1 px-4 py-3 rounded-2xl border border-line bg-white text-ink outline-none focus:border-accent focus:ring-2 focus:ring-amber-100"
                />
                <button id="first-list-create" class="px-4 py-3 rounded-full bg-accent text-white font-medium hover:opacity-90 transition-opacity">Create</button>
            </div>
        </div>
    </main>

    <!-- admin-only: per-collection access management -->
    <div id="access-backdrop" class="hidden fixed inset-0 bg-ink/40 z-40"></div>
    <section id="access-sheet" class="hidden fixed bottom-0 left-0 right-0 z-50 max-w-[720px] mx-auto bg-paper rounded-t-2xl shadow-2xl">
        <div class="px-5 pt-4 pb-3 flex items-center justify-between border-b border-line">
            <h2 class="text-lg font-semibold">Who can see this list</h2>
            <button id="access-close" aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full text-muted hover:text-ink">
                <i class="fas fa-xmark text-lg"></i>
            </button>
        </div>
        <div class="px-5 py-3 border-b border-line">
            <label for="access-collection" class="block text-xs uppercase tracking-wide text-muted mb-1">Collection</label>
            <select id="access-collection"
                class="w-full px-4 py-3 rounded-2xl border border-line bg-white text-ink text-base outline-none focus:border-accent"></select>
        </div>
        <ul id="access-users" class="divide-y divide-line max-h-[45vh] overflow-y-auto px-5"></ul>
        <div class="px-5 pt-3 pb-5 flex flex-col gap-3 border-t border-line">
            <button id="access-delete"
                class="w-full px-4 py-3 rounded-2xl border border-red-200 text-red-600 font-medium flex items-center justify-center gap-2 hover:bg-red-50 disabled:opacity-50 transition-colors">
                <i class="fas fa-trash-can"></i>
                <span>Delete this list</span>
            </button>
            <p class="text-xs text-muted text-center">Admins always see every list.</p>
        </div>
    </section>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-ink text-paper text-sm opacity-0 pointer-events-none transition-opacity z-[60]"></div>

    <script src="../../components/back-link.js"></script>
    <script src="script.js"></script>
</body>
</html>
