<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../components/google-analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- English fallback for crawlers only: script.js swaps title, description
         and the lang attribute to the active language on load -->
    <title>Nebo · The Night Atlas</title>
    <meta name="description" content="The sky above Slovenia right now: stars, planets and the Moon's exact phase, computed live in your browser from orbital mechanics.">
    <meta name="theme-color" content="#0b102a">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nebo">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        night: '#0b102a',
                        panel: '#101838',
                        panel2: '#0e1430',
                        star: '#e7eaf8',
                        dim: '#98a0c4',
                        clay: '#e06a3d',
                        claybt: '#f0824f',
                        brass: '#e9c98f',
                    },
                    fontFamily: {
                        display: ['Fraunces', 'Georgia', 'serif'],
                        mono: ['"Space Mono"', 'monospace'],
                        sans: ['"IBM Plex Sans"', 'sans-serif'],
                    },
                    borderColor: {
                        hairline: 'rgba(231, 234, 248, 0.14)',
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans bg-night text-star min-h-screen leading-relaxed">

    <div class="max-w-[1200px] mx-auto px-4 sm:px-6 py-6 sm:py-10">

        <!-- Masthead. All visible copy lives in lang/*.json; the data-i18n
             hooks here are filled by i18n.js once the dictionary loads. -->
        <header class="reveal reveal-1 relative border-b-2 border-star/80 pb-6 sm:pb-8 mb-6 sm:mb-8">
            <div class="flex items-center justify-between gap-3 mb-5">
                <a id="back-link" href="../../" class="shrink-0 whitespace-nowrap text-dim no-underline hover:text-claybt transition-colors font-mono text-sm" data-i18n="head.back" data-i18n-attr="aria-label:a11y.back"></a>
                <select id="langSelect" class="shrink-0 font-mono text-[0.68rem] uppercase tracking-widest text-star bg-night border border-hairline rounded-[3px] px-2 py-1.5 cursor-pointer focus:outline-none focus:border-clay" data-i18n-attr="aria-label:a11y.language">
                    <option value="en">EN</option>
                    <option value="sl">SLO</option>
                </select>
            </div>
            <div class="flex items-end justify-between gap-6">
                <div>
                    <h1 class="font-display font-semibold text-[clamp(2.4rem,7vw,4.5rem)] leading-[1.02] tracking-tight">Nebo</h1>
                    <p class="font-display italic text-dim mt-1 text-[clamp(0.95rem,2vw,1.1rem)]"><span data-i18n="head.taglinePre"></span> <span class="font-mono not-italic text-[0.8em] tracking-wide" data-i18n="head.taglineAbbr"></span> <span data-i18n="head.taglinePost"></span></p>
                </div>
                <!-- Rotating stamp ornament -->
                <svg class="stamp-ornament hidden md:block shrink-0 w-28 h-28 -mb-2 text-brass" viewBox="0 0 100 100" aria-hidden="true">
                    <defs>
                        <path id="stampCircle" d="M 50,50 m -36,0 a 36,36 0 1,1 72,0 a 36,36 0 1,1 -72,0" />
                    </defs>
                    <circle cx="50" cy="50" r="47" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 3" />
                    <circle cx="50" cy="50" r="26" fill="none" stroke="currentColor" stroke-width="1" />
                    <path d="M50 28 L53 47 L72 50 L53 53 L50 72 L47 53 L28 50 L47 47 Z" fill="currentColor" opacity="0.85" />
                    <text font-family="'Space Mono', monospace" font-size="8.5" letter-spacing="2.2" fill="currentColor">
                        <textPath href="#stampCircle" data-i18n="head.stamp"></textPath>
                    </text>
                </svg>
            </div>
        </header>

        <div class="notice hidden mb-5 rounded-[3px] border border-clay bg-clay/10 text-claybt px-4 py-3 font-mono text-sm" id="errorMsg" role="alert"></div>

        <!-- Dome plate + almanac -->
        <div class="grid grid-cols-1 lg:grid-cols-[minmax(380px,3fr)_2fr] gap-5 items-start">

            <!-- The dome -->
            <section class="reveal reveal-2">
                <figure class="m-0">
                    <div class="plate relative bg-panel2 border border-star/25 rounded-[3px] p-2 shadow-[0_14px_40px_rgba(3,5,16,0.55)]">
                        <!-- chips: in-flow above the dome on phones, floating on wider screens -->
                        <div class="flex flex-wrap justify-between gap-2 p-1 pb-2 sm:p-0 sm:contents">
                            <div class="bg-night/80 backdrop-blur-[2px] border border-hairline rounded-[3px] px-3 py-2 sm:absolute sm:top-4 sm:left-4 sm:z-10">
                                <div class="flex items-center gap-2">
                                    <span id="liveDot" class="live-dot" aria-hidden="true"></span>
                                    <span id="plateClock" class="font-mono text-[0.78rem] text-star">&ndash;</span>
                                </div>
                                <div id="plateDate" class="font-mono text-[0.62rem] tracking-[0.18em] uppercase text-dim mt-0.5">&ndash;</div>
                            </div>
                            <!-- place + coords are JS-managed (geolocation can overwrite them), no data-i18n -->
                            <div class="bg-night/80 backdrop-blur-[2px] border border-hairline rounded-[3px] px-3 py-2 text-right sm:absolute sm:top-4 sm:right-4 sm:z-10">
                                <div id="platePlace" class="font-mono text-[0.78rem] text-star">&ndash;</div>
                                <div id="plateCoords" class="font-mono text-[0.62rem] tracking-[0.14em] text-dim mt-0.5">&ndash;</div>
                            </div>
                        </div>

                        <canvas id="skyCanvas" class="block w-full rounded-[2px]" data-i18n-attr="aria-label:a11y.canvas"></canvas>

                        <!-- hover tooltip -->
                        <div id="tooltip" class="tooltip hidden" role="status"></div>
                    </div>
                    <figcaption class="flex flex-wrap items-baseline gap-x-3 gap-y-0.5 mt-2.5 px-1">
                        <span class="font-mono text-[0.7rem] text-dim" data-i18n="plate.caption"></span>
                        <div class="flex-1 min-w-8 border-b border-dotted border-star/20"></div>
                        <span class="font-mono text-[0.7rem] text-dim/70 whitespace-nowrap" data-i18n="plate.lookingUp"></span>
                    </figcaption>
                </figure>

                <!-- Controls -->
                <div class="mt-4 bg-panel border border-hairline rounded-[3px] p-4">
                    <div class="flex items-baseline justify-between gap-3 mb-2">
                        <label for="timeSlider" class="font-mono text-[0.68rem] tracking-[0.25em] uppercase text-dim" data-i18n="controls.turnHours"></label>
                        <span id="offsetLabel" class="font-mono text-[0.78rem] text-brass">&ndash;</span>
                    </div>
                    <input type="range" id="timeSlider" min="-1440" max="1440" step="5" value="0"
                        data-i18n-attr="aria-label:a11y.slider">
                    <div class="flex justify-between font-mono text-[0.62rem] text-dim/70 mt-1" aria-hidden="true">
                        <span data-i18n="controls.minus24"></span><span data-i18n="controls.scaleMid"></span><span data-i18n="controls.plus24"></span>
                    </div>

                    <div class="flex flex-wrap items-center gap-2 mt-4">
                        <button id="nowBtn" class="btn-press font-mono font-bold text-[0.72rem] uppercase tracking-widest bg-clay text-night border border-clay rounded-[3px] px-4 py-2 hover:bg-claybt hover:border-claybt transition" data-i18n="controls.now"></button>
                        <input type="date" id="dateInput" class="font-mono text-[0.72rem] text-star bg-night border border-hairline rounded-[3px] px-3 py-2 focus:outline-none focus:border-clay" data-i18n-attr="aria-label:a11y.date">
                        <span class="flex-1 min-w-2"></span>
                        <button data-opt="showLines" class="chip-toggle is-on" aria-pressed="true" data-i18n="controls.figures"></button>
                        <button data-opt="showLabels" class="chip-toggle is-on" aria-pressed="true" data-i18n="controls.names"></button>
                        <button data-opt="showGraticule" class="chip-toggle is-on" aria-pressed="true" data-i18n="controls.grid"></button>
                        <button id="geoBtn" class="btn-press font-mono text-[0.72rem] uppercase tracking-widest bg-transparent text-star border border-star/40 rounded-[3px] px-4 py-2 hover:bg-star hover:text-night transition" data-i18n="controls.mySky"></button>
                    </div>
                </div>
            </section>

            <!-- The night's ledger -->
            <aside class="reveal reveal-3 bg-panel border border-hairline rounded-[3px] p-5 sm:p-6">
                <div class="flex items-start justify-between gap-3 border-b border-hairline pb-3 mb-3">
                    <h2 class="font-display italic font-medium text-xl" data-i18n="ledger.title"></h2>
                    <span id="ledgerDate" class="font-mono text-[0.62rem] font-bold uppercase tracking-[0.12em] text-brass border-[1.5px] border-brass/70 rounded-[2px] px-2 py-1 whitespace-nowrap">&ndash;</span>
                </div>

                <h3 class="ledger-heading" data-i18n="ledger.sun"></h3>
                <dl>
                    <div class="record-row"><dt data-i18n="ledger.sunset"></dt><span class="leader"></span><dd id="sunsetVal">&ndash;</dd></div>
                    <div class="record-row"><dt data-i18n="ledger.trueNight"></dt><span class="leader"></span><dd id="nightStartVal">&ndash;</dd></div>
                    <div class="record-row"><dt data-i18n="ledger.sunrise"></dt><span class="leader"></span><dd id="sunriseVal">&ndash;</dd></div>
                </dl>

                <!-- the moon canvas must survive translation passes, so the text sits in its own span -->
                <h3 class="ledger-heading mt-5"><span data-i18n="ledger.moon"></span> <canvas id="moonIcon" width="22" height="22" class="inline-block align-[-5px] ml-1" aria-hidden="true"></canvas></h3>
                <dl>
                    <div class="record-row"><dt data-i18n="ledger.moonrise"></dt><span class="leader"></span><dd id="moonriseVal">&ndash;</dd></div>
                    <div class="record-row"><dt data-i18n="ledger.moonset"></dt><span class="leader"></span><dd id="moonsetVal">&ndash;</dd></div>
                    <div class="record-row"><dt data-i18n="ledger.phase"></dt><span class="leader"></span><dd id="phaseVal">&ndash;</dd></div>
                    <div class="record-row"><dt data-i18n="ledger.illuminated"></dt><span class="leader"></span><dd id="illumVal" class="text-brass">&ndash;</dd></div>
                </dl>

                <h3 class="ledger-heading mt-5" data-i18n="ledger.wanderers"></h3>
                <dl id="planetRows"></dl>

                <p class="mt-5 pt-3 border-t border-hairline font-display italic text-dim text-[0.92rem]" id="ledgerNote" data-i18n="ledger.note"></p>
            </aside>
        </div>

        <!-- Colophon -->
        <footer class="reveal reveal-4 mt-10 pt-4 border-t border-hairline flex flex-wrap gap-x-6 gap-y-1 justify-between">
            <p class="font-mono text-[0.7rem] text-dim/90" data-i18n="footer.method"></p>
            <p class="font-mono text-[0.7rem] text-dim/60" data-i18n="footer.credit"></p>
        </footer>
    </div>

    <script src="../../components/back-link.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => { /* offline shell is a bonus, not a requirement */ });
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
