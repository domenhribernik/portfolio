<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../components/google-analytics.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../base-style.css">
  <link rel="stylesheet" href="style.css">
  <title>Maze Generator</title>
</head>
<body>
  <div class="page-wrap">
    <div class="main-layout">
      <!-- Config panel -->
      <aside class="config-panel">

        <div class="config-section">
          <h3>Grid</h3>
          <div class="field">
            <label>Type</label>
            <select id="grid-type">
              <option value="square">Square</option>
              <option value="hex">Hexagonal</option>
              <option value="triangle">Triangle</option>
              <option value="polar">Polar</option>
              <option value="upsilon">Upsilon</option>
            </select>
          </div>
          <div class="field">
            <label class="slider-label">
              <span id="label-cols">Cols</span>
              <span id="val-cols" class="slider-val">20</span>
            </label>
            <input type="range" id="grid-width" min="3" max="80" value="20">
          </div>
          <div class="field">
            <label class="slider-label">
              <span id="label-rows">Rows</span>
              <span id="val-rows" class="slider-val">20</span>
            </label>
            <input type="range" id="grid-height" min="3" max="80" value="20">
          </div>
        </div>

        <div class="config-section">
          <h3>Algorithm</h3>
          <div class="field">
            <select id="algorithm">
              <option value="dfs">Recursive Backtracker</option>
              <option value="prims">Prim's</option>
              <option value="kruskals">Kruskal's</option>
              <option value="wilsons">Wilson's</option>
              <option value="aldousBroder">Aldous-Broder</option>
              <option value="huntAndKill">Hunt-and-Kill</option>
              <option value="sidewinder">Sidewinder</option>
              <option value="binaryTree">Binary Tree</option>
              <option value="recursiveDiv">Recursive Division</option>
              <option value="ellers">Eller's</option>
            </select>
          </div>
          <div class="seed-row">
            <input type="text" id="seed" placeholder="Seed (random)">
            <button class="btn ghost" id="random-seed" title="New random seed"><i class="fas fa-dice"></i></button>
          </div>
          <div class="field" style="margin-top:0.4rem">
            <label>Entrance / Exit</label>
            <select id="entrance-placement">
              <option value="corners">Opposite corners</option>
              <option value="farthest">Farthest pair</option>
              <option value="random">Random</option>
            </select>
          </div>
        </div>

        <div class="config-section">
          <h3>Output</h3>
          <div class="field">
            <label class="slider-label">
              <span>Cell size</span>
              <span id="val-cellsize" class="slider-val">20</span>
            </label>
            <input type="range" id="cell-size" min="5" max="50" step="1" value="20">
          </div>
          <div class="field">
            <label class="slider-label">
              <span>Wall thickness</span>
              <span id="val-wallwidth" class="slider-val">1.5</span>
            </label>
            <input type="range" id="wall-width" min="0.5" max="5" step="0.1" value="1.5">
          </div>
          <label class="toggle-row">
            <span>Show solution</span>
            <input type="checkbox" id="show-solution">
          </label>
          <label class="toggle-row" style="margin-top:0.4rem">
            <span>Solution page (print)</span>
            <input type="checkbox" id="solution-page">
          </label>
          <div class="print-row" style="margin-top:0.5rem">
            <select id="paper-size">
              <option value="a4">A4</option>
              <option value="letter">Letter</option>
              <option value="custom">Custom (mm)</option>
            </select>
            <select id="paper-orient">
              <option value="portrait">Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </div>
          <div class="print-row" id="paper-custom-row" style="margin-top:0.4rem; display:none">
            <input type="number" id="paper-w" min="20" max="2000" step="1" value="210" placeholder="Width (mm)">
            <input type="number" id="paper-h" min="20" max="2000" step="1" value="297" placeholder="Height (mm)">
          </div>
        </div>

        <button class="btn full" id="generate-btn">
          <i class="fas fa-redo-alt"></i> Generate
        </button>

        <button class="btn full ghost" id="print-btn">
          <i class="fas fa-print"></i> Print / Save as PDF
        </button>

        <!-- Score widget -->
        <div class="score-widget">
          <h3 class="widget-title">Difficulty</h3>
          <div class="score-header">
            <span id="score-value">–</span>
            <span id="score-label">–</span>
          </div>
          <div class="score-bar-track">
            <div id="score-bar"></div>
          </div>

          <svg id="bk-radar" class="bk-radar" viewBox="0 0 200 190" aria-hidden="true"></svg>
        </div>

      </aside>

      <!-- Maze + solution -->
      <div class="maze-area">
        <div class="maze-wrap">
          <div class="maze-title">
            <span class="maze-title-main">Maze Generator</span>
            <span class="maze-title-sub">by Domen Hribernik</span>
          </div>
          <div id="maze-container"></div>
        </div>

        <!-- Solution page — hidden on screen, printed as second page when toggled -->
        <div class="solution-page">
          <h2>Solution</h2>
          <div id="solution-container"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
</body>
</html>
