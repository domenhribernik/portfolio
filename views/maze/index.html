<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../components/google-analytics.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../base-style.css">
  <link rel="stylesheet" href="style.css">
  <title>Maze Generator</title>
</head>
<body>
  <main-navbar></main-navbar>

  <div class="page-wrap">
    <header>
      <a href="../../" class="back-link"><i class="fas fa-arrow-left"></i> Portfolio</a>
      <h1><i class="fas fa-puzzle-piece" style="color:var(--accent);margin-right:0.4rem"></i>Maze Generator</h1>
    </header>

    <div class="main-layout">
      <!-- Config panel -->
      <aside class="config-panel">

        <div class="config-section">
          <h3>Grid</h3>
          <div class="field">
            <label>Type</label>
            <select id="grid-type">
              <option value="square">Square</option>
              <option value="hex">Hexagonal</option>
              <option value="triangle">Triangle</option>
              <option value="polar">Polar</option>
            </select>
          </div>
          <div class="field">
            <label class="slider-label">
              <span id="label-cols">Cols</span>
              <span id="val-cols" class="slider-val">20</span>
            </label>
            <input type="range" id="grid-width" min="3" max="80" value="20">
          </div>
          <div class="field">
            <label class="slider-label">
              <span id="label-rows">Rows</span>
              <span id="val-rows" class="slider-val">20</span>
            </label>
            <input type="range" id="grid-height" min="3" max="80" value="20">
          </div>
        </div>

        <div class="config-section">
          <h3>Algorithm</h3>
          <div class="field">
            <select id="algorithm">
              <option value="dfs">Recursive Backtracker</option>
              <option value="prims">Prim's</option>
              <option value="kruskals">Kruskal's</option>
              <option value="wilsons">Wilson's</option>
              <option value="sidewinder">Sidewinder</option>
              <option value="binaryTree">Binary Tree</option>
              <option value="recursiveDiv">Recursive Division</option>
            </select>
          </div>
          <div class="seed-row">
            <input type="text" id="seed" placeholder="Seed (random)">
            <button class="btn ghost" id="random-seed" title="New random seed"><i class="fas fa-dice"></i></button>
          </div>
          <div class="field" style="margin-top:0.4rem">
            <label>Entrance / Exit</label>
            <select id="entrance-placement">
              <option value="corners">Opposite corners</option>
              <option value="farthest">Farthest pair</option>
              <option value="random">Random</option>
            </select>
          </div>
        </div>

        <div class="config-section">
          <h3>Output</h3>
          <label class="toggle-row">
            <span>Show solution</span>
            <input type="checkbox" id="show-solution">
          </label>
          <label class="toggle-row" style="margin-top:0.4rem">
            <span>Solution page (print)</span>
            <input type="checkbox" id="solution-page">
          </label>
          <div class="print-row" style="margin-top:0.5rem">
            <select id="paper-size">
              <option value="a4">A4</option>
              <option value="letter">Letter</option>
            </select>
            <select id="paper-orient">
              <option value="portrait">Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </div>
        </div>

        <button class="btn full" id="generate-btn">
          <i class="fas fa-redo-alt"></i> Generate
        </button>

        <button class="btn full ghost" id="print-btn">
          <i class="fas fa-print"></i> Print / Save as PDF
        </button>

        <!-- Score widget -->
        <div class="score-widget">
          <h3 class="widget-title">Difficulty</h3>
          <div class="score-header">
            <span id="score-value">–</span>
            <span id="score-label">–</span>
          </div>
          <div class="score-bar-track">
            <div id="score-bar"></div>
          </div>

          <div class="breakdown">
            <div class="breakdown-row">
              <span class="bk-label">Path length</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-solution"></div></div>
            </div>
            <div class="breakdown-row">
              <span class="bk-label">Decisions</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-decision"></div></div>
            </div>
            <div class="breakdown-row">
              <span class="bk-label">Dead ends</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-deadend"></div></div>
            </div>
            <div class="breakdown-row">
              <span class="bk-label">Junctions</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-junction"></div></div>
            </div>
            <div class="breakdown-row">
              <span class="bk-label">Trap depth</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-trap"></div></div>
            </div>
            <div class="breakdown-row">
              <span class="bk-label">Size</span>
              <div class="bk-wrap"><div class="bk-bar" id="bk-size"></div></div>
            </div>
          </div>
        </div>

      </aside>

      <!-- Maze + solution -->
      <div class="maze-area">
        <div id="maze-container"></div>

        <!-- Solution page — hidden on screen, printed as second page when toggled -->
        <div class="solution-page">
          <h2>Solution</h2>
          <div id="solution-container"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../../components/main-navbar.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
