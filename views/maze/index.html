<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../components/google-analytics.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../../base-style.css">
  <link rel="stylesheet" href="style.css">
  <title>Maze Generator</title>
</head>
<body>
  <main-navbar></main-navbar>

  <div class="page-wrap">
    <header>
      <a href="../../" class="back-link"><i class="fas fa-arrow-left"></i> Portfolio</a>
      <h1><i class="fas fa-puzzle-piece" style="color:var(--accent);margin-right:0.4rem"></i>Maze Generator</h1>
    </header>

    <div class="main-layout">
      <!-- Config panel -->
      <aside class="config-panel">

        <div class="config-section">
          <h3>Grid</h3>
          <div class="field">
            <label>Type</label>
            <select id="grid-type">
              <option value="square">Square</option>
              <option value="hex">Hexagonal</option>
            </select>
          </div>
          <div class="dims-row">
            <div class="field">
              <label>Cols</label>
              <input type="number" id="grid-width"  value="20" min="3" max="80">
            </div>
            <span>×</span>
            <div class="field">
              <label>Rows</label>
              <input type="number" id="grid-height" value="20" min="3" max="80">
            </div>
          </div>
        </div>

        <div class="config-section">
          <h3>Algorithm</h3>
          <div class="field">
            <select id="algorithm">
              <option value="dfs">Recursive Backtracker</option>
              <option value="prims">Prim's</option>
              <option value="kruskals">Kruskal's</option>
              <option value="wilsons">Wilson's</option>
              <option value="sidewinder">Sidewinder</option>
              <option value="binaryTree">Binary Tree</option>
              <option value="recursiveDiv">Recursive Division</option>
            </select>
          </div>
        </div>

        <div class="config-section">
          <h3>Seed</h3>
          <div class="seed-row">
            <input type="text" id="seed" placeholder="random">
            <button class="btn ghost" id="random-seed" title="New random seed"><i class="fas fa-dice"></i></button>
          </div>
        </div>

        <div class="config-section">
          <h3>Display</h3>
          <label class="toggle-row">
            <span>Show solution</span>
            <input type="checkbox" id="show-solution">
          </label>
          <div style="margin-top:0.5rem">
            <label class="toggle-row">
              <span>Include solution page (print)</span>
              <input type="checkbox" id="solution-page">
            </label>
          </div>
        </div>

        <button class="btn full" id="generate-btn">
          <i class="fas fa-redo-alt"></i> Generate
        </button>

        <button class="btn full ghost" id="print-btn">
          <i class="fas fa-print"></i> Print / Save as PDF
        </button>

        <!-- Score widget -->
        <div class="score-widget">
          <h3 style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.5rem">Difficulty</h3>
          <div class="score-header">
            <span id="score-value">–</span>
            <span id="score-label">–</span>
          </div>
          <div class="score-bar-track">
            <div id="score-bar"></div>
          </div>
        </div>

      </aside>

      <!-- Maze + solution -->
      <div class="maze-area">
        <div id="maze-container"></div>

        <!-- Solution page — hidden on screen, printed as second page when toggled -->
        <div class="solution-page">
          <h2>Solution</h2>
          <div id="solution-container"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../../components/main-navbar.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
