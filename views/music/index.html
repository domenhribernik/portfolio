<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../../components/google-analytics.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guitar Backing Tracks</title>
    <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#f6f2ea',
                        'paper-2': '#efe9dd',
                        card: '#fffdf8',
                        ink: '#1c1a17',
                        stone: '#6b6256',
                        clay: '#d4451f',
                        'clay-dk': '#b8371a',
                        pine: '#2f5b53',
                        cobalt: '#1f35e0',
                        marigold: '#f2b705',
                    },
                    fontFamily: {
                        display: ['"Bricolage Grotesque"', 'sans-serif'],
                        serif: ['"Bricolage Grotesque"', 'sans-serif'],
                        sans: ['"IBM Plex Sans"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../base-style.css">
    <link rel="stylesheet" href="style.css" />
</head>

<body class="editorial bg-paper text-ink font-sans antialiased">
    <main-navbar site="../../"></main-navbar>

    <main class="music-app">
        <header class="music-header">
            <h1 class="music-title">Guitar Backing Tracks</h1>
            <p class="music-subtitle">My personal collection of guitar tracks to jam with.</p>
            <nav class="screen-nav" aria-label="Music screens">
                <a href="./" class="screen-nav__link is-active"><i class="fas fa-play"></i> Player</a>
                <a href="editor/" class="screen-nav__link"><i class="fas fa-pen-nib"></i> Editor</a>
                <a href="analysis/" class="screen-nav__link"><i class="fas fa-wave-square"></i> Analysis</a>
            </nav>
        </header>

        <div class="music-content">
            <!-- Now playing: the single persistent deck, hidden until a tape is picked -->
            <section class="deck-panel hidden" id="deckPanel" aria-label="Now playing">
                <div class="deck-head">
                    <span class="deck-head__side" id="deckSide">AC</span>
                    <div class="deck-head__titles">
                        <span class="deck-head__title" id="deckTitle">No tape loaded</span>
                        <span class="deck-head__artist" id="deckArtist"></span>
                    </div>
                    <span class="deck-head__time" id="deckTime"></span>
                </div>
                <div class="deck-body">
                    <div class="deck">
                        <span class="reel reel--left"></span>
                        <div class="waveform-container">
                            <div class="waveform" id="waveform"></div>
                            <div class="loading-spinner-music hidden" id="deckSpinner">
                                <i class="fas fa-spinner fa-pulse"></i>
                            </div>
                        </div>
                        <span class="reel reel--right"></span>
                    </div>
                    <div class="player-controls" id="playerControls">
                        <button class="btn-play" id="btnPlay" aria-label="Play or pause">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="volume-container">
                            <i class="fas fa-volume-up"></i>
                            <input class="volume-slider" id="volumeSlider" type="range" min="0" max="100" value="100">
                        </div>
                        <div class="track-progress">
                            <span class="current-time" id="currentTime">0:00</span>
                            <div class="progress-bar" id="progressBar">
                                <div class="progress" id="progress"></div>
                            </div>
                            <span class="total-time" id="totalTime">0:00</span>
                        </div>
                        <div class="rate-group" id="rateGroup"></div>
                        <a class="btn-tab hidden" id="btnTab" target="_blank" rel="noopener">
                            <i class="fas fa-guitar"></i> Tab
                        </a>
                    </div>
                    <div class="chordsheet hidden" id="chordsheet"></div>
                </div>
            </section>

            <!-- Tape crate: search + filters + compact track list -->
            <section class="finder" aria-label="Track finder">
                <div class="finder__head">
                    <span class="finder__label"><i class="fas fa-box-archive"></i> Tape Crate</span>
                    <span class="finder__count" id="finderCount"></span>
                </div>
                <div class="finder__search">
                    <i class="fas fa-magnifying-glass"></i>
                    <input type="search" id="searchInput" placeholder="Type a song or an artist..."
                        autocomplete="off" spellcheck="false" aria-label="Search tracks">
                    <span class="finder__key" aria-hidden="true">/</span>
                </div>
                <div class="finder__filters">
                    <div class="filter-row" id="filterCategory">
                        <span class="filter-row__label">Type</span>
                        <button class="filter-chip is-active" data-value="">All</button>
                        <button class="filter-chip" data-value="acoustic"><i class="fas fa-guitar"></i> Acoustic</button>
                        <button class="filter-chip" data-value="electric"><i class="fas fa-bolt"></i> Electric</button>
                    </div>
                    <div class="filter-row" id="filterDuration">
                        <span class="filter-row__label">Length</span>
                        <button class="filter-chip is-active" data-value="">Any</button>
                        <button class="filter-chip" data-value="short">Under 3:00</button>
                        <button class="filter-chip" data-value="mid">3:00 to 4:30</button>
                        <button class="filter-chip" data-value="long">Over 4:30</button>
                    </div>
                    <div class="filter-row">
                        <span class="filter-row__label">Artist</span>
                        <div class="artist-dd" id="artistDd">
                            <button class="artist-dd__toggle" id="artistToggle" aria-haspopup="listbox"
                                aria-expanded="false">
                                <span id="artistToggleLabel">All artists</span>
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="artist-dd__menu hidden" id="artistMenu" role="listbox"></div>
                        </div>
                    </div>
                </div>
                <div class="finder__results" id="results"></div>
                <p class="finder__empty hidden" id="finderEmpty">Nothing on that shelf. Loosen the filters.</p>
            </section>
        </div>

        <footer class="music-footer">
            <a class="back-link" href="../../"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/6.6.3/wavesurfer.min.js"></script>
    <script type="module" src="../../components/main-navbar.js"></script>
    <script src="chord-card.js"></script>
    <script src="script.js"></script>
    <script src="../../components/gtranslate.js"></script>
</body>

</html>
