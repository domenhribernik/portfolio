<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../components/google-analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocks Watchlist</title>
    <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['IBM Plex Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f1117] min-h-screen flex items-start justify-center p-6 font-sans">

    <div class="w-full max-w-lg">

        <!-- Header -->
        <div class="mb-8">
            <p class="text-xs font-mono text-green-500 tracking-widest uppercase mb-1">Portfolio Watchlist</p>
            <h1 class="text-3xl font-semibold text-white">Stock Tickers</h1>
            <p class="text-sm text-gray-500 mt-1">Add tickers to track — saved to <span class="font-mono text-gray-400">cache/stocks.json</span></p>
        </div>

        <!-- Add ticker form -->
        <div class="flex gap-2 mb-6">
            <input
                id="tickerInput"
                type="text"
                placeholder="e.g. AAPL, TSLA, BRK.B"
                maxlength="10"
                autocomplete="off"
                autocapitalize="characters"
                class="flex-1 bg-[#1a1d26] border border-[#2a2d3a] text-white font-mono placeholder-gray-600 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition-colors uppercase"
            >
            <button
                id="addBtn"
                class="px-5 py-3 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 whitespace-nowrap"
            >
                <i class="fas fa-plus text-xs"></i> Add
            </button>
        </div>

        <!-- Error message -->
        <p id="errorMsg" class="text-red-400 text-xs font-mono mb-4 hidden"></p>

        <!-- Ticker list -->
        <div id="tickerList" class="flex flex-col gap-2"></div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-4xl mb-3 opacity-20">
                <i class="fas fa-chart-line"></i>
            </div>
            <p class="text-gray-600 text-sm">No tickers yet. Add one above.</p>
        </div>

        <!-- Count -->
        <div id="countBar" class="hidden mt-6 pt-4 border-t border-[#1e2130] flex items-center justify-between">
            <span class="text-xs text-gray-600 font-mono"><span id="tickerCount">0</span> ticker(s)</span>
            <button id="clearAllBtn" class="text-xs text-gray-600 hover:text-red-400 font-mono transition-colors">
                clear all
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
